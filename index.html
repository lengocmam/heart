<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Heartbeat Particle Animation</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #0a0a0a;
    overflow: hidden;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
</style>
</head>
<body>
<canvas id="heart"></canvas>
<script>
const canvas = document.getElementById('heart');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Toa do tim theo phuong trinh tham so trai tim
function heartPoint(t) {
  const x = 16 * Math.pow(Math.sin(t), 3);
  const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
  return { x, y };
}

const PARTICLE_COUNT = 13000;
let particles = [];

function initParticles() {
  particles = [];
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const t = Math.random() * Math.PI * 2;
    const base = heartPoint(t);
    // chi 12% hat bam sat vien, con lai rai deu khap khoi trai tim
    const isFill = Math.random() < 0.88;
    let bx, by;
    if (isFill) {
      // sqrt(random) cho phan bo deu hon theo dien tich, khong don ve tam hay vien
      const pull = Math.sqrt(Math.random());
      bx = base.x * (1 - pull * 0.98);
      by = base.y * (1 - pull * 0.98) + pull * 2.2;
    } else {
      bx = base.x;
      by = base.y;
    }
    const jitterAmount = 0.4;
    bx += (Math.random() - 0.5) * jitterAmount;
    by += (Math.random() - 0.5) * jitterAmount;

    particles.push({
      bx, by,
      // hat bat dau bay tan loan khap noi, sau do se hoi tu dan ve trai tim
      x: (Math.random() - 0.5) * 90,
      y: (Math.random() - 0.5) * 90,
      size: 0.6 + Math.random() * 1.3,
      speed: 0.015 + Math.random() * 0.02,
      hue: 335 + Math.random() * 20,
      baseAlpha: 0.5 + Math.random() * 0.4,
      twinkle: Math.random() * Math.PI * 2
    });
  }
}
initParticles();

let t = 0;

function draw() {
  const w = canvas.width;
  const h = canvas.height;

  // hieu ung mo dan nhe, khong lam nen qua toi
  ctx.fillStyle = 'rgba(8, 8, 10, 0.35)';
  ctx.fillRect(0, 0, w, h);

  t += 0.02;

  // nhip dap: hai xung nhu nhip tim that (lub-dub)
  const beat = Math.pow(Math.max(0, Math.sin(t * 2)), 8) * 0.14
             + Math.pow(Math.max(0, Math.sin(t * 2 - 0.5)), 12) * 0.08;
  const scale = Math.min(w, h) / 46 * (1 + beat);

  const cx = w / 2;
  const cy = h / 2;

  ctx.globalCompositeOperation = 'lighter';

  for (const p of particles) {
    p.x += (p.bx - p.x) * p.speed;
    p.y += (p.by - p.y) * p.speed;

    const px = cx + p.x * scale;
    const py = cy + p.y * scale;

    p.twinkle += 0.04;
    const alpha = p.baseAlpha * (0.75 + Math.sin(p.twinkle) * 0.25) + beat * 0.4;

    ctx.beginPath();
    ctx.arc(px, py, p.size * (1 + beat * 0.6), 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue}, 95%, 68%, ${Math.min(1, Math.max(0, alpha))})`;
    ctx.fill();
  }

  ctx.globalCompositeOperation = 'source-over';

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
